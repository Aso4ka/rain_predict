<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отзывы</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container">
        <nav>
            <a class="logo" href="index.html">RainPredict</a>

            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="register.html">Регистрация</a></li>
                <li><a href="dashboard.html">Личный кабинет</a></li>

                <li><a class="active" href="feedback.html">Отзывы</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="container">
    <section class="card">
        <h1>Обратная связь</h1>
        <p class="muted-text">Оставьте оценку и короткий комментарий о работе сервиса.</p>

        <form id="feedbackForm">
            <div class="form-group">
                <textarea
                    id="feedbackText"
                    placeholder="Ваш отзыв"
                    rows="6"
                    class="feedback-input"
                    required
                ></textarea>
            </div>

            <div class="form-group">
                <select id="feedbackRating" class="feedback-input">
                    <option value="5">5</option>
                    <option value="4">4</option>
                    <option value="3">3</option>
                    <option value="2">2</option>
                    <option value="1">1</option>
                </select>
            </div>

            <button class="btn" type="submit">Отправить</button>
        </form>
    </section>
</main>

<footer>
    © 2026 RainPredict
</footer>

<script src="app.js"></script>
</body>
</html>
